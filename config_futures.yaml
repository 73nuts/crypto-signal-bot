system:
  default_symbol: ETH
  market_type: future
  name: Crypto Futures Signal System
  supported_symbols:
  - BNB
  - BTC
  - ETH
  - SOL
  timezone: Asia/Shanghai
  version: 2.0.0
take_profit:
  # Reduced to improve hit rate and avoid profit giveback
  atr_multipliers:
    moderate: 4.5
    strong: 6.0
    very_strong: 7.5
    weak: 3.0
  buy_first_multiplier: 0.15  # first take profit (more aggressive)
  buy_second_multiplier: 0.6  # second take profit (moderate)
  max_percent: 0.03  # max take profit 3%
  min_percent: 0.015 # min take profit 1.5%

# ============================================
# Auto trading config
# ============================================
auto_trading:
  # Global switch
  enabled: ${ENABLE_AUTO_TRADING:false}

  # Testnet / mainnet toggle
  testnet:
    enabled: true  # testnet mode (forced safety valve)
    api_key: ${BINANCE_TESTNET_API_KEY:}
    api_secret: ${BINANCE_TESTNET_API_SECRET:}
    base_url: https://testnet.binancefuture.com

  mainnet:
    enabled: false  # mainnet (must be manually enabled after 30+ days of testnet)
    api_key: ${BINANCE_API_KEY:}
    api_secret: ${BINANCE_API_SECRET:}
    base_url: https://fapi.binance.com

  # Signal execution config
  signal_execution:
    auto_execute: true  # auto-execute signals (false = record only, no orders)
    execute_types: [LONG, SELL, SHORT]  # signal types to execute
    execute_symbols: [ETH, SOL, BNB, BTC]  # symbols to execute

    # Testnet: run all strategies (data collection)
    strategy_filter:
      enabled: false  # disabled on testnet, execute all
      min_confidence: 75  # enable for live funds: minimum confidence
      block_list: []  # enable for live funds: blocklist [{symbol: ETH, action: SHORT}]

  # Order execution config
  order_execution:
    default_order_type: MARKET  # MARKET/LIMIT
    market_order_timeout: 30  # market order timeout (seconds)
    limit_order_price_offset: 0.001  # limit order price offset (0.1%)

    retry:
      max_attempts: 3  # max retry attempts
      backoff_seconds: 5  # retry interval (exponential backoff)

    slippage:
      max_acceptable_percent: 0.5  # max acceptable slippage 0.5%
      alert_threshold_percent: 0.3  # slippage alert threshold 0.3%

  # Position management config
  position_management:
    # Position sizing
    position_sizing:
      method: signal_based  # signal_based/fixed_percent/kelly
      signal_based_multiplier: 1.0  # use 100% of signal-suggested position
      max_position_value_percent: 30  # max position per symbol 30%
      min_position_usd: 10  # minimum position size (testnet)

    # Take profit / stop loss monitoring
    tp_sl_monitor:
      check_interval_seconds: 10  # check interval 10 seconds
      price_trigger_tolerance: 0.001  # price trigger tolerance 0.1%

      # Partial take profit config
      partial_take_profit:
        enabled: true
        first_tp_percent: 50  # first TP closes 50%
        second_tp_percent: 100  # second TP closes remaining 100%

    # Startup sync
    sync_on_startup:
      enabled: true  # sync Binance positions on startup
      close_untracked_positions: false  # do not close untracked positions (testnet)

  # Risk control config
  risk_control:
    # Leverage config
    leverage: 10  # global leverage multiplier (for margin calculation)

    # Daily risk limits
    daily_limits:
      max_loss_percent: 10  # max daily loss 10% (testnet: relaxed)
      max_loss_usd: 1000  # max daily loss amount (testnet)
      pause_on_limit: true  # pause trading when limit hit
      pause_duration_hours: 24  # pause duration 24 hours

    # Position limits
    position_limits:
      max_total_position_percent: 80  # total position <= 80%
      max_symbol_position_percent: 30  # per-symbol position <= 30%
      max_open_positions: 8  # max concurrent positions (4 symbols x 2 directions)

    # Consecutive loss protection
    consecutive_loss:
      threshold: 5  # 5 consecutive losses
      pause_duration_hours: 1  # pause 1 hour

    # API rate limits
    api_limits:
      max_orders_per_minute: 10
      max_orders_per_hour: 100

    # Emergency stop
    emergency_stop:
      halt_file: TRADING_HALT  # stop trading when this file exists
      alert_channels: [email, feishu]  # alert channels
      auto_close_positions: false  # do not auto-close positions (testnet)

  # Performance analysis config
  performance_analysis:
    enabled: true

    # Statistics frequency
    realtime_stats: true  # real-time statistics update
    daily_report_time: "09:00"  # daily report time (UTC+8)
    weekly_report_day: monday  # weekly report day

    # Grouping dimensions
    group_by:
      - symbol
      - strategy_name
      - signal_type
      - overall

    # Report delivery
    send_reports:
      daily: true
      weekly: true
      channels: [email]
