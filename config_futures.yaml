binance:
  api_key: ${BINANCE_API_KEY:}
  api_secret: ${BINANCE_API_SECRET:}
  default_type: future
  testnet: false
  # Position mode: one_way or hedge
  # one_way: only long or short at a time, no positionSide param
  # hedge: both long and short simultaneously, requires positionSide=LONG/SHORT
  position_mode: hedge
dynamic_interval:
  default_interval: 30
  enabled: true
  volatility_thresholds:
  - interval: 10
    label: extreme_volatility
    threshold: 0.05
  - interval: 15
    label: high_volatility
    threshold: 0.03
  - interval: 30
    label: normal_volatility
    threshold: 0.01
  - interval: 30
    label: low_volatility
    threshold: 0.0
email:
  enabled: true
  password: ${EMAIL_PASSWORD:}
  recipients:
  - email: ${EMAIL_RECIPIENT:}
    enabled: true
  smtp_ports:
  - 587
  - 465
  smtp_server: smtp.gmail.com
  username: ${EMAIL_USERNAME:}
feishu:
  enabled: ${FEISHU_ENABLED:false}
  webhook_secret: ${FEISHU_WEBHOOK_SECRET:}
  webhook_url: ${FEISHU_WEBHOOK_URL:}
logging:
  file_template: '{symbol}_signal_log.txt'
  level: INFO
policy_integration:
  enabled: ${ENABLE_POLICY_INTEGRATION:false}
  fallback:
    confidence_penalty_by_severity:
      CRITICAL: -15
      HIGH: -10
      LOW: 0
      MEDIUM: -5
    use_original_signal: true
  gmail_monitor:
    check_interval_seconds: 120
  grok:
    api_key: ${GROK_API_KEY:}
    max_tokens: 1000
    model: ${GROK_MODEL:x-ai/grok-4-fast}
    temperature: 0.3
    timeout_seconds: 60
  mode: webhook
  webhook:
    port: 8080
    secret_key: ${WEBHOOK_SECRET_KEY}
position:
  default_percentage: 10
  max_percentage: 20
  min_percentage: 5
signal:
  ma_period: 25
  macd_fast: 12
  macd_signal: 9
  macd_slow: 26
  macd_thresholds:
    improvement_significant: 2
    macd_hist_deep: 3
    macd_hist_shallow: 5
    sell_medium: 8
    sell_strong: 15
  max_signals_per_day: 3
  min_interval_hours: 4
  price_ma25_threshold: 0.02
  quiet_hours:
  - 0
  - 0  # quiet hours disabled
  significant_move: 0.03

  # Intraday signal config (15-minute fast trading)
  intraday:
    enabled: true
    # Take profit / stop loss parameters (fixed percentage)
    take_profit_percent: 0.015  # 1.5% take profit
    stop_loss_percent: 0.010    # 1.0% stop loss

    # Push limits
    max_signals_per_day: 5      # max 5 per day (LONG and SHORT counted independently)
    min_interval_hours: 2       # minimum 2-hour interval

    # Confidence threshold (intraday independent threshold)
    # Intraday strategies inherently score lower (60-75), must use independent standard
    confidence_threshold: 72

    # Analysis parameters
    analysis_timeframe: 15m     # primary analysis timeframe: 15 minutes
    confirmation_timeframe: 1h  # trend confirmation timeframe: 1 hour

    # ============================================
    # Intraday signal enhancement config
    # ============================================

    # Funding rate config
    funding_rate:
      threshold_high: 0.001     # 0.1% high threshold (market overheated)
      threshold_low: -0.0005    # -0.05% low threshold (market panic)

    # Open interest config
    open_interest:
      lookback_minutes: 5       # lookback 5 minutes
      significant_change: 0.05  # 5% change is significant

    # Liquidation data config
    liquidation:
      lookback_hours: 1         # lookback 1 hour
      one_sided_threshold: 0.7  # 70% one-sided liquidation threshold

    # Tick-level large order config
    tick_analysis:
      lookback_trades: 100      # lookback 100 trades
      large_order_usd: 10000    # $10k large order threshold
      pressure_threshold: 1.5   # 1.5x buy/sell pressure threshold

# ============================================
# Signal enhancement config
# ============================================
enhanced_indicators:
  # Top trader long/short ratio
  enable_top_trader: true
  top_trader_period: 5m           # data period: 5 minutes

  # OBV money flow analysis
  enable_obv_flow: true
  obv_lookback_days: 5            # lookback days

  # CMF Chaikin Money Flow
  enable_cmf: true

  # OI open interest change (intraday only)
  enable_oi_change: true

stop_loss:
  # Reduced to improve hit rate while maintaining risk/reward >= 1:1
  atr_multipliers:
    moderate: 1.5
    strong: 2.0
    very_strong: 2.5
    weak: 1.2
  max_percent: 0.04  # max stop loss 4%
  min_percent: 0.02  # min stop loss 2%
storage:
  enabled: true
  mysql:
    database: ${MYSQL_DATABASE:crypto_signals}
    host: ${MYSQL_HOST:localhost}
    password: ${MYSQL_PASSWORD:}
    port: ${MYSQL_PORT:3306}
    user: ${MYSQL_USER:root}
