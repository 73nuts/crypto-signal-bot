site_name: Ignis Docs
site_description: Ignis Crypto Signal System - API Documentation
site_url: https://73nuts.github.io/crypto-signal-bot/

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: false
            show_root_heading: true
            show_category_heading: true
            members_order: source
            docstring_style: google

nav:
  - Home: index.md
  - API Reference:
    - Core: api/core.md
    - Trading: api/trading.md
    - Strategies: api/strategies.md
    - Scanner: api/scanner.md
  - Development:
    - Architecture: development/ARCHITECTURE.md
  - Analysis:
    - Swing Strategy: analysis/SWING_STRATEGY.md
    - Scanner: analysis/SCANNER.md
  - Operations:
    - Commands: operations/COMMANDS.md
  - ADR:
    - aiogram Migration: adr/ADR-001-aiogram-migration.md
    - Router Redundant Calls: adr/ADR-002-router-redundant-calls.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - tables
