user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Rate limiting zone definition
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/m;
    limit_req_status 429;

    # Cloudflare IP whitelist (complete list)
    # Source: https://www.cloudflare.com/ips-v4
    geo $cloudflare_ip {
        default 0;

        # Docker internal network (webhook_network gateway)
        172.20.0.0/16 1;

        # Cloudflare IPv4 ranges
        173.245.48.0/20 1;
        103.21.244.0/22 1;
        103.22.200.0/22 1;
        103.31.4.0/22 1;
        141.101.64.0/18 1;
        108.162.192.0/18 1;
        190.93.240.0/20 1;
        188.114.96.0/20 1;
        197.234.240.0/22 1;
        198.41.128.0/17 1;
        162.158.0.0/15 1;
        104.16.0.0/13 1;
        104.24.0.0/14 1;
        172.64.0.0/13 1;
        131.0.72.0/22 1;
    }

    # Upstream backends (multi-symbol)
    upstream webhook_backend_eth {
        server policy-monitor-eth:8081;
        keepalive 16;
    }

    upstream webhook_backend_sol {
        server policy-monitor-sol:8082;
        keepalive 16;
    }

    server {
        listen 8080;
        server_name _;

        # Webhook endpoint - generic (supports multi-symbol ALL mode)
        location = /webhook/trump {
            # Layer 1: rate limiting (fast DDoS interception)
            limit_req zone=webhook_limit burst=5 nodelay;

            # Layer 2: key authentication (all requests must be verified)
            auth_request /auth_eth;

            # POST only
            if ($request_method !~ ^(POST)$) {
                return 405;
            }

            # Validate Content-Type
            if ($content_type !~ "application/json") {
                return 400;
            }

            # Proxy to ETH service (multi-symbol architecture, handled internally by Flask)
            proxy_pass http://webhook_backend_eth/webhook/trump;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeout settings (ALL mode processes 4 symbols and needs more time)
            proxy_connect_timeout 30s;
            proxy_send_timeout 180s;
            proxy_read_timeout 300s;  # 5 minutes, enough to handle 4 symbols
        }

        # Webhook endpoint - ETH
        location /webhook/trump/ETH {
            # Layer 1: rate limiting (fast DDoS interception)
            limit_req zone=webhook_limit burst=5 nodelay;

            # Layer 2: key authentication (all requests must be verified)
            auth_request /auth_eth;

            # POST only
            if ($request_method !~ ^(POST)$) {
                return 405;
            }

            # Validate Content-Type
            if ($content_type !~ "application/json") {
                return 400;
            }

            # Proxy to ETH service (strip path prefix)
            proxy_pass http://webhook_backend_eth/webhook/trump;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeout settings
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Webhook endpoint - SOL
        location /webhook/trump/SOL {
            # Layer 1: rate limiting (fast DDoS interception)
            limit_req zone=webhook_limit burst=5 nodelay;

            # Layer 2: key authentication (all requests must be verified)
            auth_request /auth_sol;

            # POST only
            if ($request_method !~ ^(POST)$) {
                return 405;
            }

            # Validate Content-Type
            if ($content_type !~ "application/json") {
                return 400;
            }

            # Proxy to SOL service (strip path prefix)
            proxy_pass http://webhook_backend_sol/webhook/trump;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeout settings
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }


        # Key verification endpoint - ETH (internal use)
        location = /auth_eth {
            internal;
            proxy_pass http://webhook_backend_eth/verify_key;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Secret-Key $http_x_secret_key;
        }

        # Key verification endpoint - SOL (internal use)
        location = /auth_sol {
            internal;
            proxy_pass http://webhook_backend_sol/verify_key;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Secret-Key $http_x_secret_key;
        }

        # Health check endpoint - ETH
        location /health/eth {
            proxy_pass http://webhook_backend_eth/health;
            access_log off;
        }

        # Health check endpoint - SOL
        location /health/sol {
            proxy_pass http://webhook_backend_sol/health;
            access_log off;
        }

        # Health check endpoint - global (checks ETH service)
        location = /health {
            proxy_pass http://webhook_backend_eth/health;
            access_log off;
        }

        # All other paths return 404 (silent)
        location / {
            return 404;
            access_log off;
        }
    }
}
