[pytest]
# Ignis pytest configuration

# Test directories
testpaths = tests

# Python file patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts =
    -v
    --tb=short
    -ra
    --strict-markers

# Marker definitions
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require database/API)
    e2e: End-to-end tests (require full environment)
    slow: Slow tests (>1s)

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum version
minversion = 7.0

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
