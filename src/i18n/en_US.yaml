# English Language Pack
# Language: en_US (US English)

# Status translations
status:
  # Bollinger Bands status
  oversold: "Oversold"
  overbought: "Overbought"
  neutral: "Neutral"

  # OBV trend
  inflow: "Inflow"
  outflow: "Outflow"

  # CMF pressure
  strong_buy: "Strong Buy"
  buy: "Buy"
  strong_sell: "Strong Sell"
  sell: "Sell"

  # Top trader sentiment
  BULLISH: "Bullish"
  BEARISH: "Bearish"
  NEUTRAL: "Neutral"
  UNKNOWN: "Unknown"

  # Funding rate sentiment
  bullish: "Long Dominant"
  bearish: "Short Dominant"

  # OI trend
  increasing: "Increasing"
  decreasing: "Decreasing"
