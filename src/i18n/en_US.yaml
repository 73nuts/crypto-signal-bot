  top_trader:
    title: "Top Traders"
    position_ratio: "Long/Short Ratio"
    sentiment: "Sentiment"

  # Intraday indicators
  funding_rate:
    title: "Funding Rate"
    current: "Current"
    sentiment: "Sentiment"

  open_interest:
    title: "Open Interest"
    current: "Current OI"
    change_5m: "5m Change"
