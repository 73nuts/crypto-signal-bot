  obv:
    title: "OBV Flow"
    current: "Current"
    change_5d: "5D Change"
    trend: "Trend"

  cmf:
    title: "CMF Flow"
    value: "CMF"
    pressure: "Pressure"

  orderbook:
    title: "Order Book"
    bid_ask_ratio: "Bid/Ask Ratio"
